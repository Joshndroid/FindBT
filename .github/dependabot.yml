version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/rust-app"
    schedule:
      interval: "daily"
      time: "04:00"
      timezone: "Australia/Brisbane"
    open-pull-requests-limit: 10
    groups:
      rust-minor-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "04:30"
      timezone: "Australia/Brisbane"
    open-pull-requests-limit: 10
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
