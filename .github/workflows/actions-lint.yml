name: Actions Lint

on:
  pull_request:
    paths:
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actions-security:
    name: Actions security lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: actionlint
        uses: raven-actions/actionlint@v2

      - name: zizmor
        uses: zizmorcore/zizmor-action@v0.5.7
        with:
          inputs: .github/workflows
