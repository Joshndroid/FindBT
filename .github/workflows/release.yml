name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v, for example 0.2.0"
        required: true
        type: string
      dry_run:
        description: "Build and upload artifacts without creating a GitHub release"
        required: true
        default: true
        type: boolean
      draft:
        description: "Create release as draft"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark release as prerelease"
        required: true
        default: false
        type: boolean
      notarize_macos:
        description: "Attempt macOS signing and notarization using repository secrets"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  macos:
    name: Build macOS artifacts
    runs-on: macos-latest
    env:
      MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Import Apple signing certificate
        if: ${{ inputs.notarize_macos && env.MACOS_CERTIFICATE_BASE64 != '' }}
        env:
          CERTIFICATE_BASE64: ${{ env.MACOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/findbt-signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/findbt-signing.keychain-db"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Package macOS
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_INSTALLER_SIGNING_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGNING_IDENTITY }}
          MACOS_NOTARIZE: ${{ inputs.notarize_macos && '1' || '0' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: rust-app/scripts/package-macos.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: findbt-macos
          path: rust-app/dist/macos/artifacts/*
          if-no-files-found: error

  windows:
    name: Build Windows artifacts
    runs-on: windows-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install WiX v4
        run: dotnet tool install --global wix --version 4.*

      - name: Package Windows
        shell: pwsh
        run: ./rust-app/scripts/package-windows.ps1 -Configuration Release -RequireInstaller -RequireDefender

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: findbt-windows
          path: rust-app/dist/windows/artifacts/*
          if-no-files-found: error

  publish:
    name: Publish or dry run
    runs-on: ubuntu-latest
    needs: [macos, windows]
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: List artifacts
        run: find release-artifacts -type f -maxdepth 3 -print | sort

      - name: Upload dry-run bundle
        if: ${{ inputs.dry_run }}
        uses: actions/upload-artifact@v7
        with:
          name: findbt-release-dry-run-v${{ inputs.version }}
          path: release-artifacts/**/*
          if-no-files-found: error

      - name: Create GitHub release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          name: FindBT v${{ inputs.version }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: release-artifacts/**/*
